
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        canvas {
            background: white;
            display: block;
            margin: 10px auto;
            border: 2px solid #333;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #status {
            font-size: 24px;
            font-weight: bold;
            margin: 10px 0;
            color: #333;
            min-height: 40px;
        }
        #reset {
            padding: 10px 30px;
            font-size: 18px;
            cursor: pointer;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background 0.3s;
            margin-top: 10px;
        }
        #reset:hover {
            background: #45a049;
        }
        #reset:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <h1>TIC-TAC-TOE</h1>
    <canvas id="Canvas" width="300" height="300"></canvas>
    <p id="status">It's X's turn</p>
    <button id="reset">Reset Game</button>

    <script src="script.js"></script>
</body>
</html>
